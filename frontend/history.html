<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelOS - History</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🛡️</span>
                    <h1>SentinelOS</h1>
                    <span class="badge">History</span>
                </div>
                <nav class="nav-links">
                    <a href="index.html">Chat</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="history.html" class="active">History</a>
                    <a href="analytics.html">Analytics</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="history-container">
                <div class="history-header">
                    <h2>Interaction History</h2>
                    <div class="history-controls">
                        <select id="filterMode" onchange="loadHistory()">
                            <option value="">All Modes</option>
                            <option value="chat">Chat</option>
                            <option value="blocked">Blocked</option>
                        </select>
                        <select id="filterDecision" onchange="loadHistory()">
                            <option value="">All Decisions</option>
                            <option value="ALLOW">Allowed</option>
                            <option value="BLOCK">Blocked</option>
                            <option value="REVIEW">Review</option>
                        </select>
                        <button onclick="clearHistory()" class="btn-danger">Clear History</button>
                    </div>
                </div>

                <div class="history-table-container">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Timestamp</th>
                                <th>Prompt</th>
                                <th>Decision</th>
                                <th>Risk</th>
                                <th>Mode</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <tr><td colspan="7" class="loading">Loading history...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination">
                    <button onclick="loadHistory(0)" id="prevPage" disabled>Previous</button>
                    <span id="pageInfo">Page 1</span>
                    <button onclick="loadHistory(1)" id="nextPage">Next</button>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 SentinelOS - AI Security Operating System</p>
        </footer>
    </div>

    <!-- Modal for viewing details -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/history.js"></script>
</body>
</html>
